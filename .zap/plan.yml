env:
  contexts:
    - name: Authenticated
      urls:
        - ${TARGET}
      includePaths:
        - ${TARGET}.*
      excludePaths:
        - http://stub-oidc-server:8091.*
        - https://archive.mozilla.org.*
        - https://api.dashlane.com.*
        - https://www.icann.org.*
        - https://firefox-settings-attachments.cdn.mozilla.net.*
      authentication:
        method: browser
        parameters:
          loginPageUrl: ${TARGET}
          loginPageWait: 10
          browserId: firefox
          stepDelay: 0
          diagnostics: false
          steps:
            - description: Enter username
              type: AUTO_STEPS
              cssSelector: "input[name='username']"
              value: "{%username%}"
              timeout: 1000
              totp:
                secret: UserCredentials
                period: 30
                digits: 6
                algorithm: SHA1
            - description: Enter password
              type: AUTO_STEPS
              cssSelector: "input[name='password']"
              value: "{%password%}"
              timeout: 1000
              totp:
                secret: UserCredentials
                period: 30
                digits: 6
                algorithm: SHA1
            - description: Sign in
              type: CLICK
              cssSelector: "button[type='submit']"
              timeout: 1000
              totp:
                secret: UserCredentials
                period: 30
                digits: 6
                algorithm: SHA1
        verification:
          method: poll
          loggedInRegex: \QSign out\E
          pollFrequency: 60
          pollUnits: requests
          pollUrl: ${TARGET}
          pollPostData: ""
      sessionManagement:
        method: cookie
      technology: {}
      structure: {}
      users:
        - name: alice
          credentials:
            password: password
            username: alice
  parameters: {}
jobs:
  - type: passiveScan-config
    parameters: {}
  - type: spider
    parameters:
      context: Authenticated
      user: alice
      url: ${TARGET}
      parseDsStore: null
    tests:
      - name: At least 20 URLs found
        type: stats
        onFail: INFO
        statistic: automation.spider.urls.added
        operator: '>='
        value: 20
  - type: passiveScan-wait
    parameters: {}
  - type: activeScan
    parameters:
      context: Authenticated
      user: alice
      url: ${TARGET}
    policyDefinition:
      defaultStrength: medium
      defaultThreshold: medium
  - type: report
    parameters:
      template: traditional-html
      theme: null
      reportTitle: ZAP by Checkmarx Scanning Report
    risks:
      - low
      - medium
      - high
    confidences:
      - low
      - medium
      - high
      - confirmed
    sections:
      - insights
      - instancecount
      - sequencedetails
      - alertdetails
      - alertcount
  - type: exitStatus
    parameters:
      errorLevel: Medium
      warnLevel: Low