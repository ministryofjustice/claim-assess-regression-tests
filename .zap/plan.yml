env:
  contexts:
    - name: Authenticated
      urls:
        - ${TARGET}
      includePaths:
        - ${TARGET}.*
        - http://stub-oidc-server:8091.*
      excludePaths:
        - https://.*dashlane.*
        - https://.*firefox.*
        - https://.*icann.*
        - https://.*mozilla.*
      authentication:
        method: browser
        parameters:
          loginPageUrl: ${TARGET}
          loginPageWait: 10
          browserId: firefox-headless
          stepDelay: 0
          diagnostics: false
          steps: []
        verification:
          method: poll
          loggedInRegex: \QSign out\E
          pollFrequency: 60
          pollUnits: requests
          pollUrl: ${TARGET}
          pollPostData: ""
      sessionManagement:
        method: cookie
      technology: {}
      structure: {}
      users:
        - name: alice
          credentials:
            password: password
            username: alice
        - name: bob
          credentials:
            password: password
            username: bob
  parameters: {}
jobs:
  - type: passiveScan-config
    parameters: {}
  - type: spider
    parameters:
      context: Authenticated
      user: alice
      url: ${TARGET}
      parseDsStore: null
      logoutAvoidance: true
  - type: spiderAjax
    parameters:
      context: Authenticated
      user: alice
      url: ${TARGET}
      browserId: firefox-headless
      logoutAvoidance: true
  - type: passiveScan-wait
    parameters: {}
  - type: activeScan
    parameters:
      context: Authenticated
      user: alice
      url: ${TARGET}
      maxScanDurationInMins: 5
    policyDefinition:
      defaultStrength: medium
      defaultThreshold: medium
  - type: report
    parameters:
      template: traditional-html
      theme: null
      reportTitle: ZAP by Checkmarx Scanning Report
    risks:
      - low
      - medium
      - high
    confidences:
      - low
      - medium
      - high
      - confirmed
    sections:
      - insights
      - instancecount
      - sequencedetails
      - alertdetails
      - alertcount
  - type: exitStatus
    parameters:
      errorLevel: Medium
      warnLevel: Low