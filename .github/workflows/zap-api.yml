name: ZAP-API

on:
  workflow_dispatch:
    inputs:
      laa-assess-a-claim-frontend-branch:
        description: "laa-assess-a-claim-frontend branch"
        required: false
        default: "main"
      laa-claim-for-payment-branch:
        description: "laa-claim-for-payment branch"
        required: false
        default: "main"
      laa-claim-for-payment-frontend-branch:
        description: "laa-claim-for-payment-frontend branch"
        required: false
        default: "main"
      laa-claim-for-payment-stubs-branch:
        description: "laa-claim-for-payment-stubs branch"
        required: false
        default: "main"
      target:
        description: "Target URL"
        required: true
      application:
        description: "Target application"
        required: true


permissions:
  id-token: write
  contents: read

jobs:
  zap_scan:
    name: Scan ${{ inputs.application }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLICATION: ${{ inputs.application }}
      OIDC_SERVER: "http://stub-oidc-server:8091"
      CLIENT_ID: "caa-client"
      CLIENT_SECRET: "mock-secret"
      REDIRECT_URI: "http://localhost:3000/callback"
      SCOPE: "openid profile email https://claims-api/claims_write"
      USERNAME: "alice"
      PASSWORD: "password"
      
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          ecr-registry-url: ${{ secrets.ECR_REGISTRY_URL }}
          laa-claim-for-payment-branch: ${{ inputs.laa-claim-for-payment-branch }}
          laa-claim-for-payment-ecr-role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-ecr-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REGION }}
          laa-claim-for-payment-ecr-repository: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REPOSITORY }}
          laa-claim-for-payment-frontend-branch: ${{ inputs.laa-claim-for-payment-frontend-branch }}
          laa-claim-for-payment-frontend-ecr-role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-frontend-ecr-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REGION }}
          laa-claim-for-payment-frontend-ecr-repository: ${{  vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
          laa-assess-a-claim-frontend-branch: ${{ inputs.laa-assess-a-claim-frontend-branch }}
          laa-assess-a-claim-frontend-ecr-role-to-assume: ${{ secrets.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_ROLE_TO_ASSUME }}
          laa-assess-a-claim-frontend-ecr-region: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REGION }}
          laa-assess-a-claim-frontend-ecr-repository: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPOSITORY }}
          laa-claim-for-payment-stubs-branch: ${{ inputs.laa-claim-for-payment-stubs-branch }}
          laa-claim-for-payment-stubs-civil-claims-api-ecr-role-to-assume: ${{ secrets.STUB_CIVIL_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-stubs-civil-claims-api-ecr-region: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REGION }}
          laa-claim-for-payment-stubs-civil-claims-api-ecr-repository: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY  }}
          laa-claim-for-payment-stubs-oidc-server-ecr-role-to-assume: ${{ secrets.STUB_OIDC_SERVER_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-stubs-oidc-server-ecr-region: ${{ vars.STUB_OIDC_SERVER_ECR_REGION }}
          laa-claim-for-payment-stubs-oidc-server-ecr-repository: ${{ vars.STUB_OIDC_SERVER_ECR_REPOSITORY }}

      - name: Generate PKCE
        run: |
          CODE_VERIFIER=$(openssl rand -base64 32 | tr -d '=+/')
          CODE_CHALLENGE=$(echo -n "$CODE_VERIFIER" | openssl dgst -sha256 -binary | openssl base64 | tr '+/' '-_' | tr -d '=')
          echo "CODE_VERIFIER=$CODE_VERIFIER" >> $GITHUB_ENV
          echo "CODE_CHALLENGE=$CODE_CHALLENGE" >> $GITHUB_ENV
          echo "STATE=$(openssl rand -hex 12)" >> $GITHUB_ENV

      - name: Get CSRF token
        run: |
          curl -s -c /tmp/cookies.txt "${{ env.OIDC_SERVER }}/login" -o /tmp/login.html
          CSRF=$(grep 'name="_csrf"' /tmp/login.html | sed 's/.*value="\([^"]*\)".*/\1/')
          echo "CSRF_TOKEN=$CSRF" >> $GITHUB_ENV

      - name: Login
        run: |
          curl -s -b /tmp/cookies.txt -c /tmp/cookies.txt -X POST \
            -d "username=${{ env.USERNAME }}&password=${{ env.PASSWORD }}&_csrf=${{ env.CSRF_TOKEN }}" \
            "${{ env.OIDC_SERVER }}/login" -o /dev/null

      - name: Get authorization code
        run: |
          ENC_REDIRECT=$(jq -nr --arg v "${{ env.REDIRECT_URI }}" '$v|@uri')
          ENC_SCOPE=$(jq -nr --arg v "${{ env.SCOPE }}" '$v|@uri')
          curl -s -b /tmp/cookies.txt -c /tmp/cookies.txt \
            "${{ env.OIDC_SERVER }}/oauth2/authorize?response_type=code&client_id=${{ env.CLIENT_ID }}&redirect_uri=$ENC_REDIRECT&scope=$ENC_SCOPE&code_challenge=${{ env.CODE_CHALLENGE }}&code_challenge_method=S256&state=${{ env.STATE }}" \
            -i -o /tmp/auth.txt
          AUTH_CODE=$(grep -i '^Location:' /tmp/auth.txt | sed -E 's/.*code=([^&]+).*/\1/')
          echo "AUTH_CODE=$AUTH_CODE" >> $GITHUB_ENV

      - name: Exchange code for token
        run: |
          TOKEN=$(curl -s -X POST "${{ env.OIDC_SERVER }}/oauth2/token" \
            -d "grant_type=authorization_code" \
            -d "code=${{ env.AUTH_CODE }}" \
            -d "redirect_uri=${{ env.REDIRECT_URI }}" \
            -d "client_id=${{ env.CLIENT_ID }}" \
            -d "client_secret=${{ env.CLIENT_SECRET }}" \
            -d "code_verifier=${{ env.CODE_VERIFIER }}" | jq -r '.access_token')
          echo "ZAP_AUTH_HEADER=Authorization" >> $GITHUB_ENV
          echo "ZAP_AUTH_HEADER_VALUE=Bearer $TOKEN" >> $GITHUB_ENV

      - name: Fetch OpenAPI spec
        run: |
          curl -v ${{ inputs.TARGET }}/v3/api-docs -o openapi.json

      - name: ZAP Scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d #v0.10.0
        with:
          token: ${{ env.GITHUB_TOKEN }}
          format: openapi
          target: openapi.json
          allow_issue_writing: false
          fail_action: true

      - name: Capture ${{ env.APPLICATION }} logs
        if: always()
        run: |
          docker logs claim-assess-regression-tests-${APPLICATION}-1

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 #v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: >
              :x: ZAP job failed for ${{ env.APPLICATION }}!
              Download the report:
              https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}