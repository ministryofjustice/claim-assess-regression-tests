name: ZAP

on:
  workflow_dispatch:
    inputs:
      laa-assess-a-claim-frontend-branch:
        description: "laa-assess-a-claim-frontend branch"
        required: false
        default: "main"
      laa-claim-for-payment-branch:
        description: "laa-claim-for-payment branch"
        required: false
        default: "main"
      laa-claim-for-payment-frontend-branch:
        description: "laa-claim-for-payment-frontend branch"
        required: false
        default: "main"
      laa-claim-for-payment-stubs-branch:
        description: "laa-claim-for-payment-stubs branch"
        required: false
        default: "main"
      target:
        description: "Target URL"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  zap_scan:
    name: Scan the web application
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          ecr-registry-url: ${{ secrets.ECR_REGISTRY_URL }}
          laa-claim-for-payment-branch: ${{ inputs.laa-claim-for-payment-branch }}
          laa-claim-for-payment-ecr-role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-ecr-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REGION }}
          laa-claim-for-payment-ecr-repository: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REPOSITORY }}
          laa-claim-for-payment-frontend-branch: ${{ inputs.laa-claim-for-payment-frontend-branch }}
          laa-claim-for-payment-frontend-ecr-role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-frontend-ecr-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REGION }}
          laa-claim-for-payment-frontend-ecr-repository: ${{  vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
          laa-assess-a-claim-frontend-branch: ${{ inputs.laa-assess-a-claim-frontend-branch }}
          laa-assess-a-claim-frontend-ecr-role-to-assume: ${{ secrets.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_ROLE_TO_ASSUME }}
          laa-assess-a-claim-frontend-ecr-region: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REGION }}
          laa-assess-a-claim-frontend-ecr-repository: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPOSITORY }}
          laa-claim-for-payment-stubs-branch: ${{ inputs.laa-claim-for-payment-stubs-branch }}
          laa-claim-for-payment-stubs-civil-claims-api-ecr-role-to-assume: ${{ secrets.STUB_CIVIL_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-stubs-civil-claims-api-ecr-region: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REGION }}
          laa-claim-for-payment-stubs-civil-claims-api-ecr-repository: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY  }}
          laa-claim-for-payment-stubs-oidc-server-ecr-role-to-assume: ${{ secrets.STUB_OIDC_SERVER_ECR_ROLE_TO_ASSUME }}
          laa-claim-for-payment-stubs-oidc-server-ecr-region: ${{ vars.STUB_OIDC_SERVER_ECR_REGION }}
          laa-claim-for-payment-stubs-oidc-server-ecr-repository: ${{ vars.STUB_OIDC_SERVER_ECR_REPOSITORY }}

      - name: Token Exchange
        id: zap_token
        run: |
          set -euo pipefail
          
          # Configuration
          TARGET="${{ inputs.target }}"
          OIDC_SERVER="http://stub-oidc-server:8091"
          CLIENT_ID="caa-client"
          CLIENT_SECRET="mock-secret"
          REDIRECT_URI="$TARGET/callback"
          ENC_REDIRECT_URI=$(printf %s "$REDIRECT_URI" | jq -sRr @uri)
          USERNAME="alice"
          PASSWORD="password"
          SCOPE="openid profile email Claims.Write"
          ENC_SCOPE=$(printf %s "$SCOPE" | jq -sRr @uri)
          COOKIE_JAR="cookies.txt"
          
          # Generate PKCE
          CODE_VERIFIER=$(openssl rand -base64 32 | tr -d '=+/')
          echo "CODE_VERIFIER=$CODE_VERIFIER"
          CODE_CHALLENGE=$(echo -n "$CODE_VERIFIER" | openssl dgst -sha256 -binary | openssl base64 | tr '+/' '-_' | tr -d '=')
          echo "CODE_CHALLENGE=$CODE_CHALLENGE"
          
          # Get login page to fetch CSRF
          curl -s -c "$COOKIE_JAR" "$OIDC_SERVER/login" -o login.html
          CSRF_TOKEN=$(grep 'name="_csrf"' login.html | sed 's/.*value="\([^"]*\)".*/\1/')
          echo "CSRF_TOKEN: $CSRF_TOKEN"
          
          # Login
          curl -s -b "$COOKIE_JAR" -c "$COOKIE_JAR" -X POST \
            -d "username=$USERNAME&password=$PASSWORD&_csrf=$CSRF_TOKEN" \
            "$OIDC_SERVER/login" -o /dev/null
          
          # Request authorization code
          AUTHORIZE=$(curl -s -i -b "$COOKIE_JAR" -c "$COOKIE_JAR" \
            "$OIDC_SERVER/oauth2/authorize?response_type=code&client_id=$CLIENT_ID&redirect_uri=$ENC_REDIRECT_URI&scope=$ENC_SCOPE&code_challenge=$CODE_CHALLENGE&code_challenge_method=S256&state=$STATE")
          
          AUTH_CODE=$(echo "$AUTHORIZE" | grep -i Location | sed 's/.*code=\([^&]*\).*/\1/')
          echo "AUTH_CODE=$AUTH_CODE"
          
          # Exchange authorization code for tokens
          TOKEN_RESPONSE=$(curl -s -X POST "$OIDC_SERVER/oauth2/token" \
            -d "grant_type=authorization_code" \
            -d "code=$AUTH_CODE" \
            -d "redirect_uri=$REDIRECT_URI" \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "code_verifier=$CODE_VERIFIER")
          
          # Export for GitHub Actions
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          echo "ACCESS_TOKEN: $ACCESS_TOKEN"
          echo "ZAP_AUTH_HEADER_VALUE=Bearer $ACCESS_TOKEN" >> $GITHUB_ENV

      - name: ZAP scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c #v0.13.0
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Bearer ${{ env.ZAP_AUTH_HEADER_VALUE }}
          ZAP_AUTH_HEADER_SITE: ${{ inputs.target }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: ${{ inputs.target }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-d' # https://www.zaproxy.org/docs/docker/full-scan/#usage
          allow_issue_writing: false
          fail_action: true

      - name: Capture frontend logs
        if: always()
        run: |
          docker logs claim-assess-regression-tests-laa-claim-for-payment-frontend-1

#      - name: Capture backend logs
#        if: always()
#        run: |
#          docker logs claim-assess-regression-tests-laa-claim-for-payment-1
#
#      - name: Capture civil claims API logs
#        if: always()
#        run: |
#          docker logs claim-assess-regression-tests-stub-civil-claims-api-1

      - name: Capture OIDC logs
        if: always()
        run: |
          docker logs claim-assess-regression-tests-stub-oidc-server-1

