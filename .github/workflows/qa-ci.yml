name: QA ECR Playwright

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      civil_claims_api_stub_branch:
        description: "Civil Claims API Stub branch"
        required: false
        default: "main"
      backend_branch:
        description: "Backend branch"
        required: false
        default: "main"
      cfp_frontend_branch:
        description: "Claim-for-payment frontend branch"
        required: false
        default: "main"
      aac_frontend_branch:
        description: "Assess-a-claim frontend branch"
        required: false
        default: "main"

permissions:
  id-token: write
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
      LAA_CLAIM_FOR_PAYMENT_ECR_REPO: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REPOSITORY }}
      LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPO: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
      LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPO: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPOSITORY }}
      STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY }}

    steps:
      - uses: actions/checkout@v6

      # -------------------------
      # Resolve branch -> commit SHA (full) for each service repo
      # -------------------------
      - name: Resolve service SHAs
        id: resolve_shas
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;

            function branchInput(name) {
              return (context.payload.inputs && context.payload.inputs[name]) ? context.payload.inputs[name] : "main";
            }

            const services = {
              backend: { repo: "laa-claim-for-payment", branch: branchInput("backend_branch") },
              cfp:     { repo: "laa-claim-for-payment-frontend", branch: branchInput("cfp_frontend_branch") },
              aac:     { repo: "laa-assess-a-claim-frontend", branch: branchInput("aac_frontend_branch") },
              ccs:     { repo: "laa-claim-for-payment-stubs", branch: branchInput("civil_claims_api_stub_branch") },
            };

            async function resolveSha({ repo, branch }) {
              const res = await github.rest.repos.getBranch({ owner, repo, branch });
              return res.data.commit.sha;
            }

            const backendSha = await resolveSha(services.backend);
            const cfpSha = await resolveSha(services.cfp);
            const aacSha = await resolveSha(services.aac);
            const ccsSha = await resolveSha(services.ccs);
            core.info(`backend ${services.backend.repo}@${services.backend.branch} -> ${backendSha}`);
            core.info(`cfp ${services.cfp.repo}@${services.cfp.branch} -> ${cfpSha}`);
            core.info(`aac ${services.aac.repo}@${services.aac.branch} -> ${aacSha}`);
            core.info(`ccs ${services.ccs.repo}@${services.ccs.branch} -> ${ccsSha}`);

            core.setOutput("backend_sha", backendSha);
            core.setOutput("cfp_frontend_sha", cfpSha);
            core.setOutput("aac_frontend_sha", aacSha);
            core.setOutput("ccs_sha", ccsSha);

      # -------------------------
      # Pull backend image
      # -------------------------
      - name: Assume backend ECR role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REGION }}

      - name: Login to ECR (backend)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull backend image
        run: |
          TAG="${{ steps.resolve_shas.outputs.backend_sha }}"
          BACKEND_IMAGE="${ECR_REGISTRY_URL}/${LAA_CLAIM_FOR_PAYMENT_ECR_REPO}:${TAG}"
          echo "Pulling $BACKEND_IMAGE"
          docker pull "$BACKEND_IMAGE"

      # -------------------------
      # Pull CFP frontend image
      # -------------------------
      - name: Assume CFP frontend ECR role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REGION }}

      - name: Login to ECR (CFP frontend)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull CFP frontend image
        run: |
          TAG="${{ steps.resolve_shas.outputs.cfp_frontend_sha }}"
          CFP_FE_IMAGE="${ECR_REGISTRY_URL}/${LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPO}:${TAG}"
          echo "Pulling $CFP_FE_IMAGE"
          docker pull "$CFP_FE_IMAGE"

      # -------------------------
      # Pull AAC frontend image
      # -------------------------
      - name: Assume AAC frontend ECR role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REGION }}

      - name: Login to ECR (AAC frontend)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull AAC frontend image
        run: |
          TAG="${{ steps.resolve_shas.outputs.aac_frontend_sha }}"
          AAC_FE_IMAGE="${ECR_REGISTRY_URL}/${LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPO}:${TAG}"
          echo "Pulling $AAC_FE_IMAGE"
          docker pull "$AAC_FE_IMAGE"

      # -------------------------
      # Pull CCS image
      # -------------------------
      - name: Assume CCS ECR role
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.STUB_CIVIL_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REGION }}

      - name: Login to ECR (CCS)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull CCS image
        run: |
          TAG="${{ steps.resolve_shas.outputs.ccs_sha }}"
          CCS_IMAGE="${ECR_REGISTRY_URL}/${STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY}:${TAG}"
          echo "Pulling $CCS_IMAGE"
          docker pull "$CCS_IMAGE"

      # -------------------------
      # Prepare compose env vars
      # -------------------------
      - name: Prepare compose env vars
        run: |
          echo "ECR_BACKEND_REPO=${LAA_CLAIM_FOR_PAYMENT_ECR_REPO}" >> $GITHUB_ENV
          echo "ECR_CFP_FE_REPO=${LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPO}" >> $GITHUB_ENV
          echo "ECR_AAC_FE_REPO=${LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPO}" >> $GITHUB_ENV
          echo "ECR_CCS_REPO=${STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY}" >> $GITHUB_ENV

          echo "BACKEND_IMAGE_TAG=${{ steps.resolve_shas.outputs.backend_sha }}" >> $GITHUB_ENV
          echo "CFP_FE_IMAGE_TAG=${{ steps.resolve_shas.outputs.cfp_frontend_sha }}" >> $GITHUB_ENV
          echo "AAC_FE_IMAGE_TAG=${{ steps.resolve_shas.outputs.aac_frontend_sha }}" >> $GITHUB_ENV
          echo "CCS_IMAGE_TAG=${{ steps.resolve_shas.outputs.ccs_sha }}" >> $GITHUB_ENV

      - name: Start services (CI mode)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --remove-orphans
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://localhost:8080/actuator/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 2
          done

          echo "Backend did not become healthy in time"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=300 laa-claim-for-payment || true
          exit 1

      - name: Wait for Civil CLaims Stub health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://localhost:8090/actuator/health >/dev/null; then
              echo "CCS is healthy"
              exit 0
            fi
            echo "Waiting for CCS... ($i/60)"
            sleep 2
          done

          echo "Civil Claims Stub did not become healthy in time"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=300 stub-civil-claims-api || true
          exit 1    

      - name: Load .env.ci
        run: grep -v '^#' .env.ci >> $GITHUB_ENV

      - name: Enable corepack (use repo Yarn)
        run: |
          corepack enable
          yarn --version

      - name: Install deps
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      - name: Run Playwright
        run: yarn run test:local

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reports
          path: reports

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v


      - name: Analyze Run Result and Previous State
        if: always()
        id: analyzer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get the name of the step that failed
          if [[ "${{ job.status }}" == "failure" ]]; then
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[].steps[] | select(.conclusion=="failure") | .name' | head -n 1)
            echo "STEP_NAME=${FAILED_STEP:-Unknown Step}" >> $GITHUB_ENV
          fi

          # 2. Get the conclusion of the previous run
          PREV_STATE=$(gh run list --workflow "${{ github.workflow }}" --limit 2 --json conclusion --jq '.[1].conclusion')

          # 3. Determine if we should notify Slack (State change only)
          if [[ "${{ job.status }}" == "failure" && "$PREV_STATE" == "success" ]]; then
            echo "notify=true" >> $GITHUB_OUTPUT
            echo "summary_text=❌ *New Failure:* Build broke at step: *$FAILED_STEP*" >> $GITHUB_OUTPUT
          elif [[ "${{ job.status }}" == "success" && "$PREV_STATE" == "failure" ]]; then
            echo "notify=true" >> $GITHUB_OUTPUT
            echo "summary_text=✅ *Fixed:* Tests are back to normal" >> $GITHUB_OUTPUT
          else
            echo "notify=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        if: steps.analyzer.outputs.notify == 'true'
        uses: slackapi/slack-github-action@v3.0.0
        with:
          # Using the v3 specific requirements
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-templated: true
          # Providing the payload in YAML format
          payload: |
            attachments:
              - color: "${{ job.status == 'success' && 'good' || 'danger' }}"
                text: "${{ steps.analyzer.outputs.summary_text }}"
                fields:
                  - title: "Status"
                    value: "${{ job.status }}"
                    short: true
                  - title: "Triggered By"
                    value: "${{ github.actor }}"
                    short: true
                  - title: "Links"
                    value: "🔍 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false
