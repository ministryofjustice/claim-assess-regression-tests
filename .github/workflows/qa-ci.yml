name: QA ECR Playwright

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      stubs_branch:
        description: "Stubs branch"
        required: false
        default: "main"
      backend_branch:
        description: "Backend branch"
        required: false
        default: "main"
      cfp_frontend_branch:
        description: "Claim-for-payment frontend branch"
        required: false
        default: "main"
      aac_frontend_branch:
        description: "Assess-a-claim frontend branch"
        required: false
        default: "main"

permissions:
  id-token: write
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
      LAA_CLAIM_FOR_PAYMENT_ECR_REPO: ${{ vars.LAA_CLAIM_FOR_PAYMENT_ECR_REPOSITORY }}
      LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPO: ${{ vars.LAA_CLAIM_FOR_PAYMENT_FRONTEND_ECR_REPOSITORY }}
      LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPO: ${{ vars.LAA_ASSESS_A_CLAIM_FRONTEND_ECR_REPOSITORY }}
      STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY: ${{ vars.STUB_CIVIL_CLAIMS_API_ECR_REPOSITORY }}
      STUB_OIDC_SERVER_ECR_REPOSITORY: ${{ vars.STUB_OIDC_SERVER_ECR_REPOSITORY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@4cd163be7859cd130800d6719d925318826038ea
        
      - name: Install deps
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      - name: Run Playwright
        run: yarn run test:local

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: reports
          path: reports

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

      - name: Analyze Run Result and Previous State
        if: always()
        id: analyzer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get the name of the step that failed
          if [[ "${{ job.status }}" == "failure" ]]; then
            FAILED_STEP=$(gh run view ${{ github.run_id }} --json jobs --jq '.jobs[].steps[] | select(.conclusion=="failure") | .name' | head -n 1)
            echo "STEP_NAME=${FAILED_STEP:-Unknown Step}" >> $GITHUB_ENV
          fi

          # 2. Get the conclusion of the previous run
          PREV_STATE=$(gh run list --workflow "${{ github.workflow }}" --limit 2 --json conclusion --jq '.[1].conclusion')

          # 3. Determine if we should notify Slack (State change only)
          if [[ "${{ job.status }}" == "failure" && "$PREV_STATE" == "success" ]]; then
            echo "notify=true" >> $GITHUB_OUTPUT
            echo "summary_text=❌ *New Failure:* Build broke at step: *$FAILED_STEP*" >> $GITHUB_OUTPUT
          elif [[ "${{ job.status }}" == "success" && "$PREV_STATE" == "failure" ]]; then
            echo "notify=true" >> $GITHUB_OUTPUT
            echo "summary_text=✅ *Fixed:* Tests are back to normal" >> $GITHUB_OUTPUT
          else
            echo "notify=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        if: failure() || steps.analyzer.outputs.notify == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 #v3.0.1
        with:
          # Using the v3 specific requirements
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-templated: true
          # Providing the payload in YAML format
          payload: |
            attachments:
              - color: "${{ job.status == 'success' && 'good' || 'danger' }}"
                text: "${{ steps.analyzer.outputs.summary_text }}"
                fields:
                  - title: "Status"
                    value: "${{ job.status }}"
                    short: true
                  - title: "Triggered By"
                    value: "${{ github.actor }}"
                    short: true
                  - title: "Links"
                    value: "🔍 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    short: false
