name: pull-ecr-image
description: 'Assume role, login to ECR, and pull an image by tag'
inputs:
  role-to-assume:
    description: 'Role to assume'
    required: true
  aws-region:
    description: 'AWS region'
    required: true
  ecr-registry:
    description: 'ECR registry'
    required: true
  ecr-repository:
    description: 'ECR repository'
    required: true
  image-tag:
    description: 'Image tag'
    required: true
runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 #v6.0.0
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 #v2.1.1

    - name: Pull image
      shell: bash
      run: |
        IMAGE="${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
        echo "Pulling $IMAGE"
        docker pull "$IMAGE"