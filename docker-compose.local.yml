services:
  laa-claim-for-payment:
    build:
      context: ../laa-claim-for-payment/claim-for-payment-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SECURITY_ENABLED: true
      CIVILCLAIMS_API_BASE_URL: http://stub-civil-claims-api:8090
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://stub-oidc-server:8091

  stub-civil-claims-api:
    build:
      context: ../laa-claim-for-payment-stubs/stub-civil-claims-api
      dockerfile: Dockerfile
    ports:
      - "8090:8090"    
      
  stub-oidc-server:
    build:
      context: ../laa-claim-for-payment-stubs/stub-oidc-server
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    volumes:
      - ./stub.yml:/opt/stub-oidc-server/config/external.yml:ro
    environment:
      SPRING_PROFILES_ACTIVE: docker

  laa-claim-for-payment-frontend:
    build:
      context: ../laa-claim-for-payment-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BASE_URL: http://localhost:3000
      API_URL: http://laa-claim-for-payment:8080
      AUTH_ENABLED: true
      ISSUER_BASE_URL: http://stub-oidc-server:8091
      REDIS_DISABLED: true
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: s3Cur3
      SESSION_NAME: sessionId
      OIDC_SCOPE: openid profile email
      CLAIMS_API_SCOPE: Claims.Write
      OIDC_LOGIN_PATH: /login
      OIDC_CLIENT_SECRET: mock-secret
      OIDC_CALLBACK_PATH: /callback
      OIDC_LOGOUT_PATH: /logout
      CLIENT_ID: caa-client
      SERVICE_NAME: Claim for Controlled Work
    depends_on:
      - laa-claim-for-payment

  laa-assess-a-claim-frontend:
    build:
      context: ../laa-assess-a-claim-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      BASE_URL: http://localhost:3001
      API_URL: http://laa-claim-for-payment:8080
      AUTH_ENABLED: true
      ISSUER_BASE_URL: http://stub-oidc-server:8091
      REDIS_DISABLED: true
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: s3Cur3
      SESSION_NAME: sessionId
      OIDC_SCOPE: openid profile email
      CLAIMS_API_SCOPE: Claims.Write
      OIDC_LOGIN_PATH: /login
      OIDC_CLIENT_SECRET: mock-secret
      OIDC_CALLBACK_PATH: /callback
      OIDC_LOGOUT_PATH: /logout
      CLIENT_ID: afe-client
      SERVICE_NAME: Assess Claim for Civil Work
    depends_on:
      - laa-claim-for-payment